<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Expert Systems</title>
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="chat-page">
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="chat-app">
        <aside class="glass-card sidebar">
            <button class="btn new-chat" onclick="newChat()"><i class="fa-solid fa-plus"></i> محادثة جديدة</button>
            <div class="history-title">السجل</div>
            <div id="chatList" class="history-list"></div>
        </aside>

        <main class="glass-card chat-main">
            <header class="chat-header">
                <div class="chat-title"><span class="logo-mark"><i class="fa-solid fa-brain"></i></span> <span id="chatTitle">محادثة جديدة</span></div>
                <div class="actions">
                    <button class="icon-btn danger" onclick="deleteChat()" title="مسح المحادثة"><i class="fa-solid fa-trash"></i> مسح</button>
                    <button class="icon-btn" onclick="location.href='/'" title="رجوع للرئيسية"><i class="fa-solid fa-arrow-right"></i> رجوع</button>
                </div>
            </header>
            <div id="messages" class="chat-body"></div>
            <div class="chat-footer">
                <input type="text" id="userInput" placeholder="اكتب سؤالك...">
                <button id="sendBtn" class="icon-btn send" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
